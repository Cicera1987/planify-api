version: '3'
services:
  app:
    container_name: nestjs-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      MONGO_URL: mongodb://mongo:27017/nest
    depends_on:
      - mongo
    volumes:
      - .:/usr/src/app
    command: npm run start:dev
    networks:
      - nestjs-network

  mongo:
    container_name: mongodb
    image: mongo:6.0
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - nestjs-network

volumes:
  mongo-data:
    driver: local

networks:
  nestjs-network:
    driver: bridge
